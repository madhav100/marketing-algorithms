<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart - Walmart</title>
  <link rel="stylesheet" href="../../../client/scss/cartPage.css" />
</head>
<body class="cart-page">
  <header class="top">
    <div class="container"><a href="/walmart">← Continue shopping</a></div>
  </header>

  <main class="container">
    <div class="grid">
      <section class="panel">
        <div class="cart-header">
          <h1>Your Cart</h1>
          <p><strong id="cart-item-count">0</strong> item(s)</p>
        </div>
        <div id="cart-items"></div>
        <div id="cart-empty-state" class="empty-state">
          <p>Your cart is empty right now.</p>
          <a class="btn btn-secondary" href="/walmart">Browse products</a>
        </div>
      </section>

      <aside class="panel">
        <h2>Order Summary</h2>
        <p>Subtotal: <strong id="cart-subtotal">$0.00</strong></p>
        <button class="btn btn-checkout wm-checkout" type="button">Checkout</button>
        <button class="btn btn-pay" type="button" disabled aria-disabled="true">Payment coming later</button>
      </aside>
    </div>
  </main>
  <script src="../../../client/js/cartPage.js"></script>
</body>
</html>
