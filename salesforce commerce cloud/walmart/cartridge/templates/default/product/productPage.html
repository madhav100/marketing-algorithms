<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}} - Walmart</title>
  <link rel="stylesheet" href="../../../client/scss/productPage.css" />
</head>
<body class="product-page" data-server-boot-id="{{serverBootId}}">
  <header class="top">
    <div class="container"><a href="/walmart">← Back to Home</a></div>
  </header>

  <main class="container">
    <section class="layout">
      <article class="panel product-media">
        <img src="{{image}}" alt="{{categoryName}} category" width="500" height="330" />
        <p class="media-caption">Generic category image for {{categoryName}}</p>
      </article>
      <article class="panel">
        <p class="eyebrow">{{categoryName}}</p>
        <h1>{{title}}</h1>
        <p class="price">{{price}}</p>
        <p class="stock">{{stock}}</p>
        <p class="status">Status: <strong>{{status}}</strong></p>
        {% if updated %}
          <p class="updated">Last updated: {{updated}}</p>
        {% endif %}
        <p class="description">{{description}}</p>
        <div class="actions">
          <button
            id="product-add-to-cart"
            class="cta"
            type="button"
            data-product-id="{{productId}}"
            data-product-title="{{title}}"
            data-product-image="{{image}}"
            data-product-price="{{priceValue}}"
            data-product-display-price="{{price}}"
            data-category-name="{{categoryName}}"
          >
            Add to cart
          </button>
          <a class="cart-link" href="/cart">View cart</a>
        </div>
      </article>
    </section>
  </main>
  <script src="../../../client/js/productPage.js"></script>
</body>
</html>
